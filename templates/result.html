<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            background: #1a1a2e;
            padding: 16px 40px;
            display: flex;
            align-items: center;
            border-bottom: 2px solid #e74c3c;
        }

        nav h1 {
            color: white;
            font-size: 20px;
            letter-spacing: 1px;
        }

        nav span {
            margin-right: 10px;
            font-size: 24px;
        }

        .container {
            max-width: 580px;
            margin: 40px auto;
            padding: 0 20px;
            width: 100%;
        }

        .result-card {
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .image-section {
            background: #f8f9fa;
            padding: 30px;
            text-align: center;
            border-bottom: 1px solid #e9ecef;
        }

        .image-section img {
            max-width: 180px;
            max-height: 180px;
            border-radius: 12px;
            object-fit: contain;
        }

        .predictions-section {
            padding: 24px;
        }

        .predictions-section h2 {
            color: #1a1a2e;
            font-size: 18px;
            margin-bottom: 20px;
            text-align: center;
        }

        .prediction {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid #e9ecef;
        }

        .prediction.top {
            border-left-color: #27ae60;
            background: #eafaf1;
        }

        .prediction-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .prediction-name {
            color: #1a1a2e;
            font-weight: 600;
            font-size: 15px;
        }

        .prediction.top .prediction-name {
            color: #1e8449;
        }

        .confidence-text {
            color: #666;
            font-size: 13px;
            font-weight: 600;
        }

        .prediction.top .confidence-text {
            color: #27ae60;
        }

        .bar-bg {
            background: #e9ecef;
            border-radius: 6px;
            height: 8px;
            overflow: hidden;
        }

        .bar-fill {
            height: 8px;
            border-radius: 6px;
            background: #e74c3c;
            width: 0%;
            transition: width 1s ease;
        }

        .prediction.top .bar-fill {
            background: #27ae60;
        }

        .top-badge {
            display: inline-block;
            background: #27ae60;
            color: white;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 8px;
            font-weight: 600;
        }

        .back-btn {
            display: block;
            text-align: center;
            margin-top: 20px;
            padding: 14px;
            background: #e74c3c;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: #c0392b;
        }

        footer {
            margin-top: auto;
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <nav>
        <span>🚦</span>
        <h1>Traffic Sign Recognition</h1>
    </nav>

    <div class="container">
        <div class="result-card">
            <div class="image-section">
                <img src="{{ '/' + image_path }}" alt="Uploaded sign">
            </div>

            <div class="predictions-section">
                <h2>🔍 Top 3 Predictions</h2>

                {% for pred in predictions %}
                <div class="prediction {{ 'top' if loop.first else '' }}">
                    <div class="prediction-header">
                        <span class="prediction-name">
                            {{ pred.class_name }}
                            {% if loop.first %}
                            <span class="top-badge">TOP</span>
                            {% endif %}
                        </span>
                        <span class="confidence-text">{{ "%.1f"|format(pred.confidence) }}%</span>
                    </div>
                    <div class="bar-bg">
                        <div class="bar-fill" data-width="{{ pred.confidence }}"></div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>

        <a href="/" class="back-btn">← Try Another Image</a>
    </div>

    <footer>
        Built with EfficientNetB0 · GTSRB Dataset · Flask
    </footer>

    <script>
        window.addEventListener('load', () => {
            document.querySelectorAll('.bar-fill').forEach(bar => {
                bar.style.width = bar.dataset.width + '%';
            });
        });
    </script>
</body>

</html>
