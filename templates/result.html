<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Prediction Result</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 60px auto;
            text-align: center;
            background: #f5f5f5;
        }

        .result-box {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-top: 20px;
        }

        img {
            max-width: 200px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .prediction {
            background: #f9f9f9;
            border-left: 4px solid #e74c3c;
            padding: 12px;
            margin: 10px 0;
            text-align: left;
            border-radius: 4px;
        }

        .top-prediction {
            border-left-color: #27ae60;
            background: #eafaf1;
        }

        .confidence-bar {
            background: #ddd;
            border-radius: 4px;
            height: 8px;
            margin-top: 6px;
        }

        .confidence-fill {
            background: #e74c3c;
            height: 8px;
            border-radius: 4px;
            display: block;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            color: #e74c3c;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <h1>🚦 Prediction Result</h1>

    <div class="result-box">
        <img src="{{ '/' + image_path }}" alt="Uploaded sign">

        <h2>Top 3 Predictions</h2>

        {% for pred in predictions %}
        <div class="prediction {{ 'top-prediction' if loop.first else '' }}">
            <strong>{{ pred.class_name }}</strong>
            <br>
            <small>Confidence: {{ "%.1f"|format(pred.confidence) }}%</small>
            <div class="confidence-bar">
                <div class="confidence-fill" style="width: {{ pred.confidence }}%"></div>
            </div>
        </div>
        {% endfor %}

        <a href="/">← Try another image</a>
    </div>
</body>

</html>
